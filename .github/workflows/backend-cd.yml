name: Backend CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/backend-cd.yml'
  workflow_dispatch: # manual redeploy / rollback

concurrency:
  group: backend-cd
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ecommerce-api

jobs:
  # Gate the deploy on the exact main commit passing build + tests — the same
  # reusable gate CI runs on PRs, so a merge result (or a direct push) can't ship
  # untested. No image is built or pushed until this is green.
  build-and-test:
    uses: ./.github/workflows/backend-test.yml

  publish:
    name: Build & push image
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
    
    # Exposes the image digest so deploy can pin the exact artifact (not :latest).
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Reuses CI's gha cache; :sha is the immutable tag, :latest a convenience pointer.
      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: src
          file: src/Ecommerce.AppHost/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Container Apps
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # mint the short-lived OIDC token for azure/login
      contents: read
    steps:
      # OIDC login — no Azure secret stored; IDs come from repo variables.
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Pin by digest so the revision is provably this run's image; migrations run on startup.
      - name: Deploy image to ACA
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE_NAME }}@${{ needs.publish.outputs.digest }}"

      # Fail if /health never returns 200; waits ~3 min for cold start (scale-from-zero + migrations).
      - name: Health check
        run: |
          fqdn=$(az containerapp show \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          url="https://$fqdn/health"
          echo "Probing $url"
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
            if [ "$code" = "200" ]; then
              echo "Healthy."
              exit 0
            fi
            echo "Attempt $i: got '$code', retrying in 15s..."
            sleep 15
          done
          echo "::error::API did not become healthy in time."
          exit 1
