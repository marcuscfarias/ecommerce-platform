name: Backend CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/backend-cd.yml'

concurrency:
  group: backend-cd
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ecommerce-api

jobs:
  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
    
    # Exposes the pushed image digest so the deploy job can pin the exact artifact
    # (an immutable @sha256:... reference, not the movable :latest tag).
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same Dockerfile/context as Backend CI's validation build, and the same gha
      # cache — so this push reuses the layers CI already compiled on the PR.
      # :${{ github.sha }} is the immutable, traceable tag; :latest is a convenience
      # pointer for humans and the ACA first-deploy.
      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: src
          file: src/Ecommerce.AppHost/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
