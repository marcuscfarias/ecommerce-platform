name: Commitlint

# RETIRED: commit linting folded into backend-ci.yml. Kept as a manual fallback
# during the rebuild; will be deleted once the new pipeline is proven.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Lint PR commits
        uses: wagoid/commitlint-github-action@v6
