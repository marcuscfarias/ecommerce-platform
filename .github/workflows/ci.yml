name: Build & Test

# RETIRED: superseded by backend-ci.yml. Kept as a manual fallback during the
# CI/CD rebuild; will be deleted once the new pipeline is proven.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: src

jobs:
  build-and-unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest  
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup and build
        uses: ./.github/actions/dotnet-build

      - name: Unit tests
        run: dotnet test Ecommerce.slnx -c Release --no-build --filter "FullyQualifiedName~UnitTests" --logger "trx" --results-directory UnitTestResults

      - name: Upload unit test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-results
          path: src/UnitTestResults/**/*.trx

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup and build
        uses: ./.github/actions/dotnet-build

      - name: Integration tests
        run: dotnet test Ecommerce.slnx -c Release --no-build --filter "FullyQualifiedName~IntegrationTests" --logger "trx" --results-directory IntegrationTestResults

      - name: Upload integration test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-results
          path: src/IntegrationTestResults/**/*.trx
