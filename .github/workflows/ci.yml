name: CI

on:
  pull_request:
    branches: [main]

  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gates ───────────────────────────────────────────────────────────
  # Lints the new commits on every push and PR.
  commitlint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the action can diff the pushed commits

      - name: Lint commits
        uses: wagoid/commitlint-github-action@v6

  # Style gate
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Verify formatting
        working-directory: src
        run: dotnet format Ecommerce.slnx --verify-no-changes --no-restore

  # Lints the non-C# files
  lint-files:
    name: Lint config files
    needs: commitlint
    if: ${{ !cancelled() && needs.commitlint.result != 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter/slim@v8
        env:
          DEFAULT_BRANCH: main
          VALIDATE_ALL_CODEBASE: false # only changed files, so pre-existing issues don't block PRs
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_GITHUB_ACTIONS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Security gates ──────────────────────────────────────────────────────────

  # Scans the commit range for leaked secrets before they reach main.
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # scan the whole commit range under review, not just the tip

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Blocks a PR that carries a NuGet package with a known CVE *right now*
  vulnerable-deps:
    name: Vulnerable dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      # dotnet list --vulnerable always exits 0, so we grep the report and fail ourselves.
      - name: Check for vulnerable packages
        working-directory: src
        run: |
          report=$(dotnet list Ecommerce.slnx package --vulnerable --include-transitive)
          echo "$report"
          if echo "$report" | grep -q "has the following vulnerable"; then
            echo "::error::Vulnerable NuGet packages detected — see the report above."
            exit 1
          fi
          echo "No vulnerable packages found."
