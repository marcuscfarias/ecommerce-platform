name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: src

jobs:
  build-and-unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Ecommerce.slnx

      - name: Build
        run: dotnet build Ecommerce.slnx -c Release --no-restore -warnaserror

      - name: Unit tests
        run: dotnet test Ecommerce.slnx -c Release --no-build --filter "FullyQualifiedName~UnitTests" --logger "trx" --results-directory TestResults

      - name: Upload unit test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-results
          path: src/TestResults/**/*.trx

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Ecommerce.slnx

      - name: Build
        run: dotnet build Ecommerce.slnx -c Release --no-restore

      - name: Integration tests
        run: dotnet test Ecommerce.slnx -c Release --no-build --filter "FullyQualifiedName~IntegrationTests" --logger "trx" --results-directory TestResults

      - name: Upload integration test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-results
          path: src/TestResults/**/*.trx
