name: Backend CI

# Path-filtered: a frontend-only change skips the (slow) integration suite.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '!src/Ecommerce.Admin.Web/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/actions/setup-dotnet/action.yml'

  push:
    branches-ignore: [main]
    paths:
      - 'src/**'
      - '!src/Ecommerce.Admin.Web/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/actions/setup-dotnet/action.yml'

# Least privilege: CI only ever reads the repository.
permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build once (warnings=errors), then unit tests, then integration tests.
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      # Build once; both test runs reuse it via --no-build.
      - name: Build
        working-directory: src
        run: dotnet build Ecommerce.slnx -c Release --no-restore

      # Unit tests first so cheap failures surface early.
      - name: Unit tests
        working-directory: src
        run: >
          dotnet test Ecommerce.slnx -c Release --no-build
          --filter "FullyQualifiedName~UnitTests"
          --logger trx --results-directory TestResults/unit

      - name: Integration tests
        working-directory: src
        run: >
          dotnet test Ecommerce.slnx -c Release --no-build
          --filter "FullyQualifiedName~IntegrationTests"
          --logger trx --results-directory TestResults/integration

  # Validation-only image build (never pushes); gated on the tests passing.
  image:
    name: Image build
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: src
          file: src/Ecommerce.AppHost/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
