name: Backend CI

# Path-filtered: a frontend-only change skips the (slow) integration suite.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '!src/Ecommerce.Admin.Web/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/backend-test.yml'
      - '.github/actions/setup-dotnet/action.yml'

  push:
    branches-ignore: [main]
    paths:
      - 'src/**'
      - '!src/Ecommerce.Admin.Web/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/backend-test.yml'
      - '.github/actions/setup-dotnet/action.yml'

# Least privilege: CI only ever reads the repository.
permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Shared build + test gate — the same one Backend CD runs before it deploys.
  build-and-test:
    uses: ./.github/workflows/backend-test.yml

  # Validation-only image build (never pushes); gated on the tests passing.
  image:
    name: Image build
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: src
          file: src/Ecommerce.AppHost/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
