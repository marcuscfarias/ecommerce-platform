name: Setup and build .NET
description: Sets up the .NET SDK, restores with a cached NuGet store, and builds the solution in Release.

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore
      shell: bash
      working-directory: src
      run: dotnet restore Ecommerce.slnx

    - name: Build
      shell: bash
      working-directory: src
      run: dotnet build Ecommerce.slnx -c Release --no-restore
