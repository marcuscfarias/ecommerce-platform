server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /https/localhost.crt;
    ssl_certificate_key /https/localhost.key;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA fallback: client-side routes are not files on disk, so serve
        # index.html and let Blazor resolve the route in the browser.
        try_files $uri $uri/ /index.html;
    }
}
