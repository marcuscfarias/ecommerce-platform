services:
  ecommerce-api:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTPS_PORTS=8081
      - Cors__AllowedOrigins__0=https://localhost:7777
    volumes:
      - ${USERPROFILE}/.aspnet/https:/https:ro

  ecommerce-db:
    env_file:
      - .env
    ports:
      - "1433:1433"
