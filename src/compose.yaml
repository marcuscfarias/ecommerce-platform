services:
  ecommerce-api:
    container_name: ecommerce-api
    image: ecommerce
    build:
      context: .
      dockerfile: Ecommerce.AppHost/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ConnectionStrings__EcommerceDb
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-net

  ecommerce-web:
    container_name: ecommerce-web
    image: ecommerce-web
    build:
      context: .
      dockerfile: Ecommerce.Admin.Web/Dockerfile
    ports:
      - "8082:443"
    networks:
      - ecommerce-net

  ecommerce-db:
    container_name: ecommerce-db
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD
      - MSSQL_PID=Express
    volumes:
      - ecommerce-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ecommerce-net

volumes:
  ecommerce-db-data:

networks:
  ecommerce-net:
    driver: bridge
